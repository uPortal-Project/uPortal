        }
        tr:hover { 
            background: #f5f5f5;
            transition: background 0.2s;
        }
        
        .crap-high { 
            color: #f44336; 
            font-weight: bold;
            font-size: 16px;
        }
        .crap-medium { 
            color: #ff9800; 
            font-weight: bold; 
        }
        .crap-low { 
            color: #4CAF50; 
        }
        
        .coverage-bad { background: #ffebee; }
        .coverage-medium { background: #fff3e0; }
        .coverage-good { background: #e8f5e9; }
        
        .pkg-name { 
            font-family: 'Courier New', monospace; 
            font-size: 12px;
            color: #666;
        }
        
        .filter { 
            margin: 20px 0; 
            padding: 15px; 
            background: #f9f9f9; 
